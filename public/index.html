<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Agent Studio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080f;
      --bg1: #0e0e1a;
      --bg2: #13131f;
      --bg3: #1a1a2a;
      --bg4: #22223a;
      --border: rgba(120,120,220,0.12);
      --border-hover: rgba(120,120,220,0.28);
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --accent-glow: rgba(108,99,255,0.18);
      --green: #22d3a8;
      --green-dim: rgba(34,211,168,0.14);
      --text: #e2e2f0;
      --text2: #9090b0;
      --text3: #5a5a80;
      --user-bubble: #2a2260;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 7px;
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: grid;
      place-items: start center;
    }

    .app {
      width: 100%;
      max-width: 1320px;
      padding: 28px 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 24px var(--accent-glow);
    }
    .logo-text h1 {
      font-size: 22px; font-weight: 700; letter-spacing: -0.4px;
      background: linear-gradient(90deg, #e2e2f0, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text p { font-size: 12px; color: var(--text3); margin-top: 1px; }

    .btn-new {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      color: #fff; border: none; cursor: pointer;
      padding: 10px 20px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; letter-spacing: 0.2px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-new:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-new:active { transform: scale(0.97); }

    /* Main grid */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      flex: 1;
      align-items: start;
    }

    /* Panel base */
    .panel {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* Chat panel */
    .chat-panel {
      display: flex; flex-direction: column;
      height: calc(100vh - 140px);
    }
    .chat-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .chat-header-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .chat-header-label { font-size: 13px; font-weight: 600; color: var(--green); }
    .chat-header-sub { font-size: 12px; color: var(--text3); margin-left: auto; }

    #messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 99px; }

    .message { display: flex; animation: msgIn 0.25s ease-out; }
    @keyframes msgIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
    .message.user { justify-content: flex-end; }
    .message.agent { justify-content: flex-start; }

    .bubble {
      max-width: 72%; padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px; line-height: 1.6;
      white-space: pre-wrap;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(120,100,255,0.3);
      border-bottom-right-radius: 4px;
    }
    .message.agent .bubble {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .agent-tag {
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      color: var(--green); margin-bottom: 5px;
      display: flex; align-items: center; gap: 5px;
    }

    .chat-input-wrap {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
    }
    #input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: var(--font);
      transition: border-color 0.2s;
      min-height: 44px; max-height: 120px;
    }
    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text3); }

    .btn-send {
      background: var(--accent);
      border: none; cursor: pointer;
      width: 44px; height: 44px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px;
      transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .btn-send:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-send:active { transform: scale(0.95); }

    /* Sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .sidebar-panel { background: var(--bg1); border: 1px solid var(--border); border-radius: var(--radius); }
    .sidebar-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: 600; color: var(--text2);
      display: flex; align-items: center; gap: 8px;
      letter-spacing: 0.3px; text-transform: uppercase;
    }
    .sidebar-header i { color: var(--accent2); font-size: 14px; }
    .sidebar-body { padding: 12px; }

    /* Subagent cards */
    .subagent-card {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 13px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      margin-bottom: 8px;
    }
    .subagent-card:last-child { margin-bottom: 0; }
    .subagent-card:hover { border-color: var(--border-hover); background: var(--bg3); transform: translateX(2px); }
    .subagent-avatar {
      width: 34px; height: 34px; border-radius: 9px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      color: #fff; font-weight: 700;
    }
    .subagent-info { flex: 1; min-width: 0; }
    .subagent-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .subagent-desc { font-size: 11px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .subagent-arrow { color: var(--text3); font-size: 12px; flex-shrink: 0; }

    /* Skills grid */
    .skill-chip {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-xs); padding: 7px 10px;
      font-size: 11px; color: var(--text2);
      display: flex; align-items: center; gap: 5px;
    }
    .skill-chip i { color: var(--accent2); font-size: 11px; }
    .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    /* Empty state */
    .empty-state { text-align: center; padding: 24px 16px; color: var(--text3); font-size: 12px; }
    .empty-state i { font-size: 28px; display: block; margin-bottom: 8px; opacity: 0.4; }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg1);
      border: 1px solid var(--border-hover);
      border-radius: 20px;
      width: 100%; max-width: 820px;
      max-height: 90vh;
      display: flex; flex-direction: column;
      animation: modalIn 0.25s ease-out;
      overflow: hidden;
    }
    @keyframes modalIn { from { opacity:0; transform: scale(0.96) translateY(12px); } to { opacity:1; transform: none; } }

    .modal-header {
      padding: 22px 28px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
    }
    .modal-header-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--accent-glow); border: 1px solid rgba(108,99,255,0.3);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent2); font-size: 18px;
    }
    .modal-title { font-size: 17px; font-weight: 700; flex: 1; }
    .modal-close {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); width: 34px; height: 34px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 16px; transition: background 0.2s, color 0.2s;
    }
    .modal-close:hover { background: var(--bg4); color: var(--text); }

    .modal-body { flex: 1; overflow-y: auto; padding: 24px 28px; }
    .modal-body::-webkit-scrollbar { width: 4px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 99px; }

    .field-label {
      font-size: 11px; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
    }

    #subagent-content {
      width: 100%; height: 260px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text); font-family: 'Fira Mono', 'Consolas', monospace;
      font-size: 13px; line-height: 1.6;
      padding: 14px 16px; resize: vertical;
      outline: none; transition: border-color 0.2s;
    }
    #subagent-content:focus { border-color: var(--accent); }

    .skills-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 22px; margin-bottom: 10px;
    }
    .btn-add-skill {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text2); font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: var(--radius-xs); cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-add-skill:hover { border-color: var(--accent); color: var(--accent2); background: var(--accent-glow); }

    .modal-skill-chip {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-xs); padding: 9px 13px;
      font-size: 12px; color: var(--text2);
      display: flex; align-items: center; gap: 7px;
    }
    .modal-skill-chip i { color: var(--accent2); }

    .modal-footer {
      padding: 16px 28px; border-top: 1px solid var(--border);
      display: flex; gap: 10px;
    }
    .btn-save {
      flex: 1; background: var(--accent);
      border: none; color: #fff; font-size: 14px; font-weight: 600;
      padding: 12px; border-radius: var(--radius-sm); cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-save:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-cancel {
      flex: 1; background: var(--bg3);
      border: 1px solid var(--border); color: var(--text2);
      font-size: 14px; font-weight: 600;
      padding: 12px; border-radius: var(--radius-sm); cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-cancel:hover { background: var(--bg4); color: var(--text); }

    /* Count badge */
    .badge {
      background: var(--accent-glow); color: var(--accent2);
      border: 1px solid rgba(108,99,255,0.25);
      font-size: 10px; font-weight: 700; padding: 1px 7px;
      border-radius: 99px; margin-left: auto;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--bg3); border: 1px solid var(--green);
      color: var(--green); font-size: 13px; font-weight: 600;
      padding: 10px 22px; border-radius: var(--radius-sm);
      box-shadow: 0 4px 24px rgba(34,211,168,0.15);
      animation: toastIn 0.25s ease-out; z-index: 200;
      display: flex; align-items: center; gap: 8px;
    }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(12px); } to { opacity:1; transform: translateX(-50%) none; } }

    @media (max-width: 960px) {
      .main-grid { grid-template-columns: 1fr; }
      .chat-panel { height: 70vh; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🧠</div>
      <div class="logo-text">
        <h1>Deep Agent Studio</h1>
        <p>Multi-agent orchestration platform</p>
      </div>
    </div>
    <button class="btn-new" onclick="createSubagent()">
      <i class="fas fa-plus"></i> New Subagent
    </button>
  </header>

  <!-- Main layout -->
  <div class="main-grid">

    <!-- Chat panel -->
    <div class="panel chat-panel">
      <div class="chat-header">
        <div class="chat-header-dot"></div>
        <span class="chat-header-label">Deep Agent Online</span>
        <span class="chat-header-sub">claude-sonnet · streaming</span>
      </div>
      <div id="messages"></div>
      <div class="chat-input-wrap">
        <textarea id="input" rows="1" placeholder="Send a message to your agent…"></textarea>
        <button class="btn-send" onclick="sendMessage()" title="Send">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="sidebar-panel">
        <div class="sidebar-header">
          <i class="fas fa-users-cog"></i>
          Subagents
          <span class="badge" id="subagent-count">0</span>
        </div>
        <div class="sidebar-body">
          <div id="subagents-list"></div>
        </div>
      </div>

      <div class="sidebar-panel">
        <div class="sidebar-header">
          <i class="fas fa-bolt"></i>
          Global Skills
          <span class="badge" id="skills-count">0</span>
        </div>
        <div class="sidebar-body">
          <div class="skills-grid" id="skills-list"></div>
        </div>
      </div>

    </aside>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-icon"><i class="fas fa-robot"></i></div>
      <h2 class="modal-title" id="modal-title">Edit Subagent</h2>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>

    <div class="modal-body">
      <p class="field-label">System Prompt / SUBAGENT.md</p>
      <textarea id="subagent-content" placeholder="Define this subagent's role, personality, and instructions…"></textarea>

      <div class="skills-section-header">
        <p class="field-label" style="margin:0">Subagent Skills</p>
        <button class="btn-add-skill" onclick="createNewSkill()">
          <i class="fas fa-plus"></i> Add Skill
        </button>
      </div>
      <div class="skills-grid" id="modal-skills"></div>
    </div>

    <div class="modal-footer">
      <button class="btn-save" onclick="saveSubagent()"><i class="fas fa-check" style="margin-right:6px"></i>Save Changes</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  let currentEditingSubagent = null;

  function showToast(msg, isError) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.borderColor = isError ? '#f87171' : 'var(--green)';
    t.style.color = isError ? '#f87171' : 'var(--green)';
    t.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2800);
  }

  function addMessage(text, type) {
    const wrap = document.createElement('div');
    wrap.className = `message ${type}`;
    wrap.innerHTML = type === 'agent'
      ? `<div class="bubble"><div class="agent-tag"><i class="fas fa-brain"></i> Deep Agent</div>${text}</div>`
      : `<div class="bubble">${text}</div>`;
    const msgs = document.getElementById('messages');
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function sendMessage() {
    const el = document.getElementById('input');
    const text = el.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    el.value = ''; el.style.height = 'auto';
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      addMessage(data.response || 'Done.', 'agent');
    } catch {
      addMessage('Connection error — is the server running?', 'agent');
    }
  }

  async function loadSubagents() {
    try {
      const res = await fetch('/api/subagents');
      const subagents = await res.json();
      document.getElementById('subagent-count').textContent = subagents.length;
      if (!subagents.length) {
        document.getElementById('subagents-list').innerHTML =
          `<div class="empty-state"><i class="fas fa-robot"></i>No subagents yet.<br>Click "New Subagent" to begin.</div>`;
        return;
      }
      document.getElementById('subagents-list').innerHTML = subagents.map(s => {
        const initials = s.name.slice(0,2).toUpperCase();
        return `<div class="subagent-card" onclick="editSubagent('${s.name}')">
          <div class="subagent-avatar">${initials}</div>
          <div class="subagent-info">
            <div class="subagent-name">${s.name}</div>
            <div class="subagent-desc">${s.description || 'No description'}</div>
          </div>
          <i class="fas fa-chevron-right subagent-arrow"></i>
        </div>`;
      }).join('');
    } catch {
      document.getElementById('subagents-list').innerHTML =
        `<div class="empty-state" style="color:#f87171"><i class="fas fa-exclamation-triangle"></i>Failed to load</div>`;
    }
  }

  async function loadSkills() {
    try {
      const res = await fetch('/api/skills');
      const skills = await res.json();
      document.getElementById('skills-count').textContent = skills.length;
      document.getElementById('skills-list').innerHTML = skills.length
        ? skills.map(s => `<div class="skill-chip"><i class="fas fa-puzzle-piece"></i>${s}</div>`).join('')
        : `<div class="empty-state" style="grid-column:span 2"><i class="fas fa-bolt"></i>No global skills</div>`;
    } catch {}
  }

  async function editSubagent(name) {
    currentEditingSubagent = name;
    document.getElementById('modal-title').textContent = name;
    document.getElementById('edit-modal').classList.add('open');
    document.getElementById('subagent-content').value = '';
    document.getElementById('modal-skills').innerHTML =
      `<div class="modal-skill-chip" style="opacity:.4;grid-column:span 2"><i class="fas fa-spinner fa-spin"></i> Loading…</div>`;
    try {
      const res = await fetch(`/api/subagent/${name}`);
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      document.getElementById('subagent-content').value = data.content || '';
      const skills = data.skills || [];
      document.getElementById('modal-skills').innerHTML = skills.length
        ? skills.map(s => `<div class="modal-skill-chip"><i class="fas fa-file-code"></i>${s}</div>`).join('')
        : `<div class="empty-state" style="grid-column:span 2"><i class="fas fa-puzzle-piece"></i>No skills yet</div>`;
    } catch (err) {
      showToast(`Could not load "${name}"`, true);
      closeModal();
    }
  }

  async function saveSubagent() {
    const content = document.getElementById('subagent-content').value;
    try {
      await fetch(`/api/subagent/${currentEditingSubagent}/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      });
      showToast('Subagent saved successfully');
      closeModal();
      loadSubagents();
    } catch {
      showToast('Save failed', true);
    }
  }

  async function createNewSkill() {
    const skillName = prompt('New Skill Name:');
    if (!skillName) return;
    try {
      await fetch(`/api/subagent/${currentEditingSubagent}/skill`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ skillName })
      });
      showToast('Skill created!');
      editSubagent(currentEditingSubagent);
    } catch {
      showToast('Failed to create skill', true);
    }
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
  }

  async function createSubagent() {
    const name = prompt('Subagent name:');
    if (!name) return;
    await fetch('/api/create-subagent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    loadSubagents();
  }

  // Auto-resize textarea
  const input = document.getElementById('input');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Close modal on overlay click
  document.getElementById('edit-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  window.onload = () => {
    loadSubagents();
    loadSkills();
    addMessage('Welcome to Deep Agent Studio. Click any subagent to edit its configuration and skills, or create a new one to get started.', 'agent');
  };
</script>
